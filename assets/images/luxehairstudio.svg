<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="luxeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient)"/>
  
  <!-- Decorative border -->
  <rect x="10" y="10" width="380" height="280" fill="none" stroke="url(#luxeGradient)" stroke-width="2"/>
  
  <!-- Main content area -->
  <rect x="30" y="30" width="340" height="240" fill="#000000" opacity="0.3"/>
  
  <!-- Title -->
  <text x="200" y="100" text-anchor="middle" fill="url(#luxeGradient)" font-family="serif" font-size="28" font-weight="bold">LUXE</text>
  <text x="200" y="130" text-anchor="middle" fill="url(#luxeGradient)" font-family="serif" font-size="20">Hair Studio</text>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="180" r="3" fill="url(#luxeGradient)" opacity="0.8"/>
  <circle cx="150" cy="200" r="2" fill="url(#luxeGradient)" opacity="0.6"/>
  <circle cx="250" cy="180" r="2" fill="url(#luxeGradient)" opacity="0.6"/>
  <circle cx="280" cy="200" r="3" fill="url(#luxeGradient)" opacity="0.8"/>
  
  <!-- Bottom accent -->
  <rect x="150" y="220" width="100" height="2" fill="url(#luxeGradient)"/>
  
  <!-- Tagline -->
  <text x="200" y="250" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="12" opacity="0.8">Premium Hair Care</text>
</svg>