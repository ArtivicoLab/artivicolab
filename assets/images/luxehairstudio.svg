<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="luxeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E91E63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E24AA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0d1f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3d1a44;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0d1f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8E24AA;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient)"/>
  
  <!-- Header area -->
  <rect x="0" y="0" width="400" height="50" fill="url(#headerGrad)" opacity="0.3"/>
  
  <!-- Logo area -->
  <rect x="20" y="15" width="30" height="20" rx="5" fill="#FF69B4"/>
  <text x="60" y="30" fill="#FF69B4" font-family="cursive" font-size="16" font-weight="bold">Luxe Hair Studio</text>
  
  <!-- Navigation dots -->
  <circle cx="300" cy="25" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="320" cy="25" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="340" cy="25" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="360" cy="25" r="2" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- Main content area -->
  <rect x="20" y="70" width="180" height="150" fill="#000000" opacity="0.2" rx="10"/>
  
  <!-- Welcome text -->
  <text x="30" y="100" fill="#FF69B4" font-family="cursive" font-size="18" font-weight="bold">Welcome to</text>
  <text x="30" y="125" fill="#FF69B4" font-family="cursive" font-size="20" font-weight="bold">Luxe Hair</text>
  <text x="30" y="150" fill="#FF69B4" font-family="cursive" font-size="20" font-weight="bold">Studio</text>
  
  <!-- Tagline -->
  <text x="30" y="175" fill="#E91E63" font-family="cursive" font-size="12" font-style="italic">Where Beauty Meets Elegance</text>
  
  <!-- Button -->
  <rect x="30" y="190" width="120" height="25" rx="12" fill="url(#luxeGradient)"/>
  <text x="90" y="206" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="10" font-weight="bold">Book Your Appointment</text>
  
  <!-- Model image placeholder -->
  <rect x="220" y="80" width="160" height="180" rx="10" fill="#000000" opacity="0.4"/>
  <circle cx="300" cy="140" r="30" fill="#8B4513" opacity="0.7"/>
  <ellipse cx="290" cy="135" rx="5" ry="8" fill="#333"/>
  <ellipse cx="310" cy="135" rx="5" ry="8" fill="#333"/>
  <path d="M 280 150 Q 300 160 320 150" stroke="#654321" stroke-width="2" fill="none"/>
  
  <!-- Carousel dots -->
  <circle cx="260" cy="270" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="280" cy="270" r="3" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="300" cy="270" r="3" fill="#FF69B4"/>
  <circle cx="320" cy="270" r="3" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="250" r="2" fill="#FF69B4" opacity="0.6"/>
  <circle cx="150" cy="260" r="1.5" fill="#E91E63" opacity="0.6"/>
  <circle cx="350" cy="70" r="2" fill="#8E24AA" opacity="0.6"/>
</svg>